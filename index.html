<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Concept Sur Mesure</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f8fa;
}

#intro {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #07172c 0%, #020c1b 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  overflow: hidden;
  perspective: 1200px;
}

#intro::before {
  content: "";
  position: absolute;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(212,175,55,0.18), transparent 70%);
  animation: glowBg 3s infinite alternate;
}

.logo-wrap {
  position: relative;
  width: 500px;
  max-width: 90%;
  display: flex;
  justify-content: center;
  align-items: center;
}

#sm-trace {
  width: 100%;
  height: auto;
  position: relative;
  z-index: 3;
}

.trace-path {
  fill: none;
  stroke: #f3d26a;
  stroke-width: 8;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 6px rgba(212,175,55,0.8))
          drop-shadow(0 0 18px rgba(212,175,55,0.75))
          drop-shadow(0 0 35px rgba(212,175,55,0.45));
  stroke-dasharray: 1200;
  stroke-dashoffset: 1200;
  animation: drawLine 2.2s ease forwards;
}

.trace-path.second {
  animation-delay: 0.25s;
}

#logo {
  width: 420px;
  max-width: 90%;
  position: absolute;
  z-index: 2;
  opacity: 0;
  transform: scale(0.82);
  filter: blur(10px) drop-shadow(0 0 10px rgba(212,175,55,0.2));
  animation: revealLogo 1s ease forwards;
  animation-delay: 2.1s;
}

.fadeOut {
  animation: fadeOut 1s forwards;
}

.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: linear-gradient(180deg, #ffffff 0%, #eef2f7 100%);
  padding: 120px 20px;
  opacity: 0;
  animation: show 1s ease forwards;
  animation-delay: 3.1s;
}

h1 {
  font-size: 48px;
  color: #111;
}

p {
  max-width: 600px;
  margin: 20px auto;
  color: #555;
}

.btn {
  background: #d4af37;
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  background: #c39a1d;
}

@keyframes drawLine {
  0% {
    stroke-dashoffset: 1200;
    opacity: 0.2;
  }
  20% {
    opacity: 1;
  }
  100% {
    stroke-dashoffset: 0;
    opacity: 1;
  }
}

@keyframes revealLogo {
  0% {
    opacity: 0;
    transform: scale(0.82);
    filter: blur(10px) drop-shadow(0 0 10px rgba(212,175,55,0.2));
  }
  60% {
    opacity: 1;
    transform: scale(1.05);
    filter: blur(0) drop-shadow(0 0 40px rgba(212,175,55,0.65));
  }
  100% {
    opacity: 1;
    transform: scale(1);
    filter: blur(0) drop-shadow(0 0 28px rgba(212,175,55,0.55));
  }
}

@keyframes glowBg {
  from {
    opacity: 0.35;
    transform: scale(0.95);
  }
  to {
    opacity: 0.75;
    transform: scale(1.05);
  }
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

@keyframes show {
  to {
    opacity: 1;
  }
}

@media (max-width: 768px) {
  #logo {
    width: 300px;
  }

  h1 {
    font-size: 34px;
  }

  p {
    font-size: 16px;
  }

  .trace-path {
    stroke-width: 6;
  }
}
</style>
</head>

<body>

<div id="intro">
  <div class="logo-wrap">

    <svg id="sm-trace" viewBox="0 0 500 260" xmlns="http://www.w3.org/2000/svg" aria-label="Tracé SM">
      <path class="trace-path" d="M120 70
                                   C70 70, 60 140, 120 145
                                   C180 150, 180 210, 115 210
                                   C75 210, 50 190, 40 170" />
      <path class="trace-path second" d="M210 205
                                          L210 75
                                          L270 165
                                          L330 75
                                          L330 205" />
    </svg>

    <img id="logo" src="logo.png" alt="SM Concept">
  </div>
</div>

<div class="hero">
  <div>
    <h1>L’excellence du sur-mesure</h1>
    <p>Des réalisations haut de gamme pensées dans les moindres détails.</p>
    <a href="#" class="btn">Demander un devis</a>
  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById("intro").classList.add("fadeOut");
}, 3100);
</script>

</body>
</html>
