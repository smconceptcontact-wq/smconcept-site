<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM Concept Sur Mesure</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
}

/* INTRO SOMBRE */
#intro {
  position:fixed;
  width:100%;
  height:100vh;
  background:#020c1b;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#logo {
  width:350px;
  animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  from {opacity:0; transform:scale(0.9);}
  to {opacity:1; transform:scale(1);}
}

.fadeOut {
  animation:fadeOut 1s forwards;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* PARTIE CLAIRE */
.main {
  background:#f5f7fa;
  min-height:100vh;
  text-align:center;
  padding:120px 20px;
  opacity:0;
  animation:show 1s ease forwards;
  animation-delay:2s;
}

@keyframes show {
  to {opacity:1;}
}

h1 {
  font-size:36px;
  color:#111;
}

p {
  color:#555;
  max-width:600px;
  margin:20px auto;
}

.btn {
  background:#d4af37;
  color:white;
  padding:12px 24px;
  border-radius:5px;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img id="logo" src="logo.png" alt="SM Concept">
</div>

<!-- PAGE -->
<div class="main">
  <h1>SM Concept Sur Mesure</h1>
  <p>
    Spécialiste du bâtiment et de l’aménagement sur mesure, nous vous accompagnons dans tous vos projets avec exigence et précision.
  </p>

  <a href="#" class="btn">Demander un devis</a>
</div>

<script>
setTimeout(()=>{
  document.getElementById("intro").classList.add("fadeOut");
},2000);
</script>

</body>
</html>
